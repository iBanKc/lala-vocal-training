<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Let's Sing — วัดเสียงร้องตรงโน้ต</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <!-- Blues Dot Music logo top-right -->
      <a href="https://bluesdotmusic.com" target="_blank" class="brand-logo" aria-label="Blues Dot Music">
        <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" class="brand-svg">
          <!-- Outer ring -->
          <circle cx="150" cy="150" r="145" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
          <circle cx="150" cy="150" r="138" fill="none" stroke="white" stroke-width="4"/>
          <!-- Inner white background -->
          <circle cx="150" cy="150" r="130" fill="#2196F3"/>
          <!-- Large C shape (white arc) -->
          <path d="M 210 80 A 85 85 0 1 0 210 220" fill="none" stroke="white" stroke-width="52" stroke-linecap="round"/>
          <!-- Diagonal bar -->
          <rect x="138" y="88" width="48" height="30" rx="14" fill="white" transform="rotate(45 162 103)"/>
          <!-- Top note head -->
          <ellipse cx="196" cy="98" rx="22" ry="18" fill="white" transform="rotate(-10 196 98)"/>
          <!-- Bottom note head -->
          <ellipse cx="196" cy="192" rx="22" ry="18" fill="white" transform="rotate(-10 196 192)"/>
          <!-- Curved text path -->
          <defs>
            <path id="textCircle" d="M 150,150 m -105,0 a 105,105 0 1,1 210,0 a 105,105 0 1,1 -210,0"/>
          </defs>
          <!-- BLUES DOT MUSIC text at bottom -->
          <path id="bottomArc" d="M 42,170 A 115,115 0 0,0 258,170" fill="none"/>
          <text font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="white" letter-spacing="3">
            <textPath href="#bottomArc" startOffset="8%">BLUES DOT MUSIC</textPath>
          </text>
        </svg>
      </a>

      <div class="header-center">
        <div class="logo">Let's Sing</div>
        <p class="tagline">วัดเสียงร้องตรงโน้ต</p>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">

      <!-- Pitch Display -->
      <section class="pitch-section">
        <div class="note-display">
          <div class="current-note" id="currentNote">—</div>
          <div class="note-octave" id="noteOctave"></div>
        </div>
        <div class="freq-display" id="freqDisplay">กด "เริ่ม" เพื่อเปิดไมค์</div>
      </section>

      <!-- Accuracy Meter -->
      <section class="meter-section">
        <div class="meter-label">ความแม่นยำ</div>
        <div class="meter-bar-wrap">
          <div class="meter-bar" id="meterBar"></div>
          <div class="meter-center"></div>
        </div>
        <div class="meter-hints">
          <span>ต่ำเกิน</span>
          <span>ตรงโน้ต</span>
          <span>สูงเกิน</span>
        </div>
        <div class="cent-display" id="centDisplay">0 cents</div>
      </section>

      <!-- Pitch History Canvas -->
      <section class="canvas-section">
        <canvas id="pitchCanvas"></canvas>
      </section>

      <!-- Target Note Selector -->
      <section class="target-section">
        <div class="target-label">โน้ตเป้าหมาย</div>
        <div class="note-buttons" id="noteButtons">
          <button class="note-btn active" data-note="C">C</button>
          <button class="note-btn" data-note="C#">C#</button>
          <button class="note-btn" data-note="D">D</button>
          <button class="note-btn" data-note="D#">D#</button>
          <button class="note-btn" data-note="E">E</button>
          <button class="note-btn" data-note="F">F</button>
          <button class="note-btn" data-note="F#">F#</button>
          <button class="note-btn" data-note="G">G</button>
          <button class="note-btn" data-note="G#">G#</button>
          <button class="note-btn" data-note="A">A</button>
          <button class="note-btn" data-note="A#">A#</button>
          <button class="note-btn" data-note="B">B</button>
        </div>
        <div class="octave-select-wrap">
          <label>ออคเทฟ:</label>
          <select id="octaveSelect">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </div>
      </section>

      <!-- Controls -->
      <section class="controls-section">
        <button class="btn-start" id="startBtn">🎤 เริ่ม</button>
        <button class="btn-stop hidden" id="stopBtn">⏹ หยุด</button>
        <button class="btn-play" id="playTargetBtn">🔊 เล่นโน้ตเป้าหมาย</button>
      </section>

      <!-- Score -->
      <section class="score-section" id="scoreSection">
        <div class="score-box">
          <div class="score-title">คะแนนเฉลี่ย</div>
          <div class="score-value" id="scoreValue">—</div>
          <div class="score-sub" id="scoreSub"></div>
        </div>
      </section>

    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>Let's Sing · Blues Dot Music · ฝึกร้องเพลงให้ตรงโน้ต</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
